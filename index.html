<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ЛЯМС · читалка (testnet)</title>
<style>
  :root { --bg:#0f1020; --card:#1a1b2e; --ink:#e8e8f0; --muted:#9aa0c0; --accent:#7c8cff; --ok:#4ade80; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:#e8e8f0; font:16px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:760px; margin:0 auto; padding:32px 20px 64px; }
  h1 { font-size:24px; margin:0 0 4px; }
  .sub { color:#9aa0c0; margin:0 0 24px; font-size:14px; }
  .badge { display:inline-block; background:#2a2c4a; color:#9aa0c0; border-radius:999px; padding:2px 10px; font-size:12px; }
  .card { background:#1a1b2e; border:1px solid #2a2c4a; border-radius:16px; padding:22px; margin:16px 0; }
  .word { font-size:28px; font-weight:700; margin:0 0 2px; }
  .meta { color:#9aa0c0; font-size:13px; margin-bottom:14px; }
  .def { background:#14152a; border-left:3px solid #7c8cff; border-radius:8px; padding:14px 16px; margin:10px 0; white-space:pre-wrap; }
  .lyams { margin-top:14px; font-size:14px; }
  .ok { color:#4ade80; font-weight:600; }
  .no { color:#f87171; font-weight:600; }
  .hash { color:#6b6f95; font-size:11px; word-break:break-all; }
  a { color:#7c8cff; }
  .err { color:#f87171; }
  .loading { color:#9aa0c0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ЛЯМС · читалка <span class="badge">testnet</span></h1>
  <p class="sub">Читает слова и определения прямо из живых контрактов в сети TON. Никакого сервера — данные с блокчейна.</p>
  <div id="out" class="loading">Читаю из сети TON…</div>
  <p class="sub" style="margin-top:28px">
    Реестр: <a id="lreg" target="_blank"></a><br>
    ЛЯМС: <a id="llya" target="_blank"></a>
  </p>
</div>

<script type="module">
import { TonClient, Address } from "https://esm.sh/@ton/ton@15";

// живые контракты testnet
const REGISTRY = "kQDCYA_6tCfa250wiC5BR3sY_1Nv_fgda4iP13dB8lHX3scT";
const LYAMS    = "kQBMDbMEnA-jvpgJUd2ddaQKx6LVO2-9KX82YNHBTReeW4sZ";

document.getElementById('lreg').textContent = REGISTRY;
document.getElementById('lreg').href = "https://testnet.tonviewer.com/" + REGISTRY;
document.getElementById('llya').textContent = LYAMS;
document.getElementById('llya').href = "https://testnet.tonviewer.com/" + LYAMS;

const client = new TonClient({ endpoint: "https://testnet.toncenter.com/api/v2/jsonRPC" });
const reg = Address.parse(REGISTRY);
const lya = Address.parse(LYAMS);

const out = document.getElementById('out');

// публичный API TON ограничивает частоту (~1 запрос/сек) → троттлинг + повтор при 429
let lastCall = 0;
async function throttle() {
  const wait = Math.max(0, 1300 - (Date.now() - lastCall));
  if (wait) await new Promise(r => setTimeout(r, wait));
  lastCall = Date.now();
}
async function runMethod(addr, method, args=[]) {
  for (let i = 0; i < 6; i++) {
    await throttle();
    try {
      return await client.runMethod(addr, method, args);
    } catch (e) {
      if (String(e).includes('429') && i < 5) {
        await new Promise(r => setTimeout(r, 2000 * (i + 1)));
        continue;
      }
      throw e;
    }
  }
}
async function callStr(addr, method, args=[]) {
  return (await runMethod(addr, method, args)).stack.readCell().beginParse().loadStringTail();
}
async function callNum(addr, method, args=[]) {
  return (await runMethod(addr, method, args)).stack.readNumber();
}
async function callBig(addr, method, args=[]) {
  return (await runMethod(addr, method, args)).stack.readBigNumber();
}
const intArg = (v) => ({ type: 'int', value: BigInt(v) });

async function main() {
  try {
    const nextId = await callNum(reg, 'nextId');          // следующий ID
    const total = Number(nextId) - 1;                      // сколько слов
    let html = `<div class="meta">Слов в реестре AGEP: <b>${total}</b></div>`;

    for (let id = 1; id <= total; id++) {
      const word = await callStr(reg, 'getWordText', [intArg(id)]);
      const cnt  = await callNum(reg, 'defCount', [intArg(id)]);
      const inLyams = await callNum(lya, 'hasWord', [intArg(id)]); // -1 = true

      // показываем определение, ВЫБРАННОЕ в твоём ЛЯМСе (твою меру)
      let defBlock = '';
      if (inLyams !== 0) {
        const dHash = await callBig(lya, 'chosenDefinition', [intArg(id)]);
        const text  = await callStr(reg, 'getDefinitionText', [intArg(dHash)]);
        defBlock = `<div class="def">${escapeHtml(text)}</div>`;
      }

      html += `<div class="card">
        <div class="word">${escapeHtml(word)}</div>
        <div class="meta">слово №${id} · вариантов определения в реестре: ${Number(cnt)}</div>
        ${defBlock}
        <div class="lyams">${inLyams !== 0
          ? '<span class="ok">✓ есть в твоём ЛЯМСе</span> — показано твоё выбранное определение'
          : '<span class="no">— не в твоём ЛЯМСе</span>'}</div>
      </div>`;
    }
    out.innerHTML = html || '<div class="loading">В реестре пока нет слов.</div>';
  } catch (e) {
    out.innerHTML = `<div class="err">Ошибка чтения из сети: ${escapeHtml(String(e))}<br>
      <span class="sub">Иногда публичный API TON отвечает с задержкой/лимитом — обнови страницу.</span></div>`;
  }
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function roman(n){const m=['','I','II','III','IV','V','VI','VII','VIII','IX','X'];return m[n]||n;}

main();
</script>
</body>
</html>
