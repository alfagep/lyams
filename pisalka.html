<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ЛЯМС · писалка (testnet)</title>
<style>
  body { margin:0; background:#0f1020; color:#e8e8f0; font:16px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; }
  .wrap { max-width:760px; margin:0 auto; padding:32px 20px 64px; }
  h1 { font-size:24px; margin:0 0 4px; }
  .sub { color:#9aa0c0; margin:0 0 20px; font-size:14px; }
  .badge { display:inline-block; background:#2a2c4a; color:#9aa0c0; border-radius:999px; padding:2px 10px; font-size:12px; }
  .card { background:#1a1b2e; border:1px solid #2a2c4a; border-radius:16px; padding:22px; margin:16px 0; }
  .ok { color:#4ade80; font-weight:600; }
  .err { color:#f87171; }
  .addr { color:#7c8cff; word-break:break-all; font-size:13px; }
  #tc-button { margin:8px 0 16px; }
  label { display:block; color:#9aa0c0; font-size:13px; margin:12px 0 4px; }
  input { width:100%; box-sizing:border-box; background:#14152a; border:1px solid #2a2c4a; border-radius:10px;
          color:#e8e8f0; padding:12px 14px; font-size:16px; }
  button.go { margin-top:16px; background:#7c8cff; color:#0f1020; border:0; border-radius:12px;
              padding:12px 20px; font-size:16px; font-weight:600; cursor:pointer; }
  button.go:disabled { opacity:.5; cursor:default; }
  .hidden { display:none; }
  a { color:#7c8cff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ЛЯМС · писалка <span class="badge">testnet</span></h1>
  <p class="sub">Подключи тестовый кошелёк и впиши слово — оно ляжет в реестр AGEP, подписанное тобой.</p>

  <div id="tc-button"></div>
  <div id="status" class="card sub">Загружаю TON Connect…</div>

  <div id="form" class="card hidden">
    <label for="word">Слово (дефидент)</label>
    <input id="word" placeholder="например: свобода" autocomplete="off">
    <div id="hint" class="sub" style="margin-top:8px"></div>
    <label class="row" style="display:flex;align-items:center;margin-top:12px;cursor:pointer">
      <input type="checkbox" id="authorial" style="width:auto;margin-right:8px"> Авторское — это моё слово-коайн (авторство за мной)
    </label>
    <button id="go" class="go">✍ Внести слово в реестр AGEP</button>
    <div id="result" class="sub" style="margin-top:14px"></div>
  </div>

  <p class="sub" style="margin-top:24px">
    После записи открой <a href="./" target="_blank">читалку</a> — слово появится там.
  </p>
</div>

<script type="module">
const status = document.getElementById('status');
const form = document.getElementById('form');
const result = document.getElementById('result');
const goBtn = document.getElementById('go');
const wordInput = document.getElementById('word');
const authorialChk = document.getElementById('authorial');
const hintEl = document.getElementById('hint');

const REGISTRY = 'kQC5sRm8rsYxbikX-9rqqcdwerg46p1DCHM0FVH98p1RiOpq';

// живая ПОДСКАЗКА (не вердикт): встречается ли слово в Викисловаре/Википедии
let hintTimer = null;
wordInput && wordInput.addEventListener('input', () => {
  clearTimeout(hintTimer);
  hintTimer = setTimeout(() => lookupHint(wordInput.value.trim()), 500);
});
async function lookupHint(word) {
  if (!word) { hintEl.textContent = ''; return; }
  hintEl.textContent = 'Проверяю в словаре…';
  try {
    const enc = encodeURIComponent(word);
    const [wikt, wiki] = await Promise.all([
      fetch(`https://ru.wiktionary.org/w/api.php?action=query&titles=${enc}&format=json&origin=*`).then(r=>r.json()),
      fetch(`https://ru.wikipedia.org/w/api.php?action=query&list=search&srsearch=${enc}&srlimit=1&format=json&origin=*`).then(r=>r.json()),
    ]);
    const inWikt = !Object.values(wikt.query.pages)[0].missing;
    const hits = (wiki.query && wiki.query.search) ? wiki.query.search.length : 0;
    if (inWikt || hits > 0)
      hintEl.innerHTML = '📖 встречается в Викисловаре/Википедии → похоже на <b>общее</b> слово (галочку обычно НЕ ставь)';
    else
      hintEl.innerHTML = '🆕 в Викисловаре/Википедии не нашлось → возможно <b>коайн</b> (если слово твоё — поставь «авторское»)';
  } catch (e) { hintEl.textContent = '(словарь недоступен — подсказки нет)'; }
}

try {
  const { TonConnectUI } = await import('https://esm.sh/@tonconnect/ui@2');
  const { beginCell } = await import('https://esm.sh/@ton/core@0');

  const tcUI = new TonConnectUI({
    manifestUrl: new URL('tonconnect-manifest.json', location.href).href,
    buttonRootId: 'tc-button',
  });

  // опкод RegisterWord = 0x52010001; word: string → ref, authorial: bool → 1 бит (формат выверен дампом)
  function registerWordBody(word, authorial) {
    return beginCell()
      .storeUint(0x52010001, 32)
      .storeUint(authorial ? 1 : 0, 1)
      .storeRef(beginCell().storeStringTail(word).endCell())
      .endCell();
  }

  function setConnected(w) {
    if (w && w.account) {
      const net = w.account.chain === '-3' ? 'TESTNET ✓' : ('chain ' + w.account.chain + ' ⚠');
      status.innerHTML = '<div class="ok">✓ Кошелёк подключён</div>' +
        '<div class="addr">' + w.account.address + '</div>' +
        '<div class="sub">сеть: ' + net + '</div>';
      form.classList.remove('hidden');
    } else {
      status.textContent = 'Кошелёк не подключён. Нажми кнопку выше.';
      form.classList.add('hidden');
    }
  }
  setConnected(tcUI.wallet);
  tcUI.onStatusChange(setConnected);

  goBtn.addEventListener('click', async () => {
    const word = wordInput.value.trim();
    if (!word) { result.innerHTML = '<span class="err">Впиши слово.</span>'; return; }
    goBtn.disabled = true;
    result.textContent = 'Подтверди транзакцию в кошельке…';
    try {
      const authorial = authorialChk.checked;
      const body = registerWordBody(word, authorial);
      await tcUI.sendTransaction({
        validUntil: Math.floor(Date.now() / 1000) + 300,
        network: '-3', // testnet
        messages: [{
          address: REGISTRY,
          amount: '100000000', // 0.1 TON на газ+хранение
          payload: body.toBoc().toString('base64'),
        }],
      });
      result.innerHTML = '<span class="ok">✓ Отправлено и подписано!</span> Слово «' +
        word.replace(/[<>&]/g,'') + '» (' + (authorial ? 'авторское' : 'общее') + ') идёт в реестр. Через ~10 сек открой читалку.';
      wordInput.value = ''; authorialChk.checked = false; hintEl.textContent = '';
    } catch (e) {
      result.innerHTML = '<span class="err">Не отправлено: ' + String(e).replace(/[<>&]/g,'') + '</span>';
    } finally {
      goBtn.disabled = false;
    }
  });
} catch (e) {
  status.innerHTML = '<span class="err">Ошибка загрузки: ' + String(e).replace(/[<>&]/g,'') + '</span>';
}
</script>
</body>
</html>
